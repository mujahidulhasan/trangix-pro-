<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SW Sample exam - CSWA</title>
    <link rel="icon" type="image/png" href="assets/favicon.png">
    <style>
        :root {
            --win-bg: #f0f0f0;
            --win-panel: #e5e5e5;
            --win-border: #bdbdbd;
            --win-dark-border: #808080;
            --text-color: #000000;
            --win-white: #ffffff;
            --tangix-orange: #ff9d00;
            --font-family: "Segoe UI", Tahoma, Arial, sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: var(--font-family);
            font-size: 11.5px;
            color: var(--text-color);
            -webkit-user-select: none;
            user-select: none;
        }

        ::-webkit-scrollbar {
            width: 16px;
            height: 16px;
            background-color: #f0f0f0;
        }
        ::-webkit-scrollbar-thumb {
            background-color: #cdcdcd;
            border: 2px solid #f0f0f0;
        }
        ::-webkit-scrollbar-thumb:hover {
            background-color: #a6a6a6;
        }
        ::-webkit-scrollbar-button {
            display: block;
            background-color: #e1e1e1;
            width: 16px;
            height: 16px;
            border: 1px solid #777777;
        }

        body {
            background-color: var(--win-bg);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }

        .app-window-titlebar {
            height: 22px;
            background-color: var(--win-white);
            border-bottom: 1px solid var(--win-border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 6px;
            flex-shrink: 0;
        }

        .titlebar-left {
            font-weight: normal;
            font-size: 11px;
            color: #1a1a1a;
        }

        .main-session-workspace {
            flex: 1;
            display: flex;
            overflow: hidden;
            background-color: var(--win-bg);
        }

        .question-sandbox-pane {
            width: 255px;
            min-width: 255px;
            max-width: 255px;
            background-color: var(--win-bg);
            border-right: 1px solid var(--win-border);
            display: flex;
            flex-direction: column;
            padding: 6px 4px 6px 6px;
            flex-shrink: 0;
        }

        .lbl-question-num {
            font-size: 14.5px;
            font-weight: bold;
            margin-bottom: 2px;
            padding-left: 2px;
        }

        .lbl-question-points {
            font-size: 11px;
            color: #202020;
            margin-bottom: 6px;
            display: block;
            padding-left: 2px;
        }

        .inner-white-instruction-container {
            flex: 1;
            background-color: var(--win-white);
            border: 1px solid var(--win-dark-border);
            padding: 6px 8px;
            overflow-y: auto;
            position: relative;
        }

        .instruction-header-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--win-border);
            padding-bottom: 3px;
            margin-bottom: 8px;
        }

        .lbl-instruction-code {
            font-weight: bold;
            font-size: 11px;
            color: #000000;
        }

        .btn-help-icon {
            cursor: pointer;
            font-weight: bold;
            font-size: 12.5px;
            color: #000000;
            margin-top: -3px;
            margin-right: -4px;
        }

        .question-text-description {
            font-size: 12.5px;
            line-height: 1.55;
            white-space: pre-line;
            color: #000000;
        }

        .attachment-download-zone {
            margin-top: 14px;
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .attachment-headline {
            font-size: 11px;
            color: #333333;
            margin-bottom: 1px;
        }

        .attachment-divider {
            height: 1px;
            background-color: var(--win-border);
            margin-bottom: 4px;
            width: 100%;
        }

        .btn-download-asset {
            background-color: transparent;
            border: none;
            padding: 2px 0;
            text-decoration: underline;
            color: #0066cc;
            display: inline-flex;
            align-items: center;
            gap: 3px;
            cursor: pointer;
            width: max-content;
        }

        .btn-download-asset:hover {
            color: #ff9d00;
        }

        .graphics-display-pane {
            flex: 1;
            display: flex;
            flex-direction: column;
            background-color: var(--win-panel);
            min-width: 0;
        }

        .graphics-toolbar {
            height: 22px;
            background-color: var(--win-bg);
            border-bottom: 1px solid var(--win-border);
            display: flex;
            align-items: center;
            padding: 0 4px;
            gap: 1px;
            flex-shrink: 0;
        }

        .btn-toolbar-tool {
            background: none;
            border: 1px solid transparent;
            width: 18px;
            height: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        .btn-toolbar-tool svg {
            width: 13px;
            height: 13px;
            fill: #333333;
        }

        .gallery-main-viewport {
            flex: 1;
            background-color: var(--win-white);
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            border-bottom: 1px solid var(--win-border);
            cursor: grab;
        }

        .gallery-main-viewport:active {
            cursor: grabbing;
        }

        .gallery-main-viewport img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            transform-origin: center center;
            position: absolute;
            transition: transform 0.04s ease-out;
        }

        .thumbnail-strip-absolute-wrapper {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 65px;
            background-color: #808080;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            padding: 0 10px;
            z-index: 100;
            border-top: 1px solid var(--win-border);
        }

        .gallery-thumbnail-node {
            width: 72px;
            height: 52px;
            background-color: var(--win-white);
            border: 1px solid var(--win-dark-border);
            cursor: pointer;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1px;
        }

        .gallery-thumbnail-node.active {
            border: 2px solid var(--tangix-orange);
            padding: 0;
        }

        .gallery-thumbnail-node img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .response-entry-channel-box {
            height: 160px;
            background-color: var(--win-bg);
            overflow: hidden;
            flex-shrink: 0;
            border-top: 1px solid var(--win-border);
        }

        .input-quadrant-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            grid-template-rows: repeat(2, 1fr);
            width: 100%;
            height: 100%;
        }

        .option-quadrant-wrapper {
            border-right: 1px solid var(--win-border);
            border-bottom: 1px solid var(--win-border);
            display: flex;
            align-items: center;
            padding: 15px 20px;
            gap: 8px;
            cursor: pointer;
            background-color: var(--win-bg);
        }

        .option-quadrant-wrapper:nth-child(2n) { border-right: none; }
        .option-quadrant-wrapper:nth-child(3), .option-quadrant-wrapper:nth-child(4) { border-bottom: none; }
        .option-quadrant-wrapper:hover { background-color: #e2e2e2; }
        .option-quadrant-wrapper input { width: 13px; height: 13px; margin: 0; margin-top: 1px; cursor: pointer; flex-shrink: 0; }
        .option-quadrant-text { font-size: 12px; text-align: left; }

        .fallback-entry-container {
            padding: 15px 20px;
            display: flex;
            align-items: center;
            gap: 8px;
            height: 100%;
        }

        .numeric-input-field {
            height: 22px;
            border: 1px solid var(--win-dark-border);
            background-color: var(--win-white);
            padding: 0 4px;
            width: 150px;
            outline: none;
        }

        .coordinate-inputs-row { display: flex; gap: 12px; align-items: center; }
        .coordinate-cell { display: flex; align-items: center; gap: 4px; font-weight: bold; }

        .sandbox-footer-control-bar {
            height: 32px;
            background-color: var(--win-bg);
            border-top: 1px solid var(--win-border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 6px;
            flex-shrink: 0;
        }

        .btn-sandbox-nav {
            background-color: var(--win-bg);
            border: 1px solid var(--win-border);
            height: 22px;
            padding: 0 8px;
            cursor: pointer;
            min-width: 110px;
            text-align: center;
            font-size: 11px;
        }

        .btn-sandbox-nav:hover {
            background-color: var(--win-panel);
            border-color: var(--win-dark-border);
        }

        .btn-sandbox-nav:disabled { opacity: 0.4; cursor: not-allowed; }

        .footer-left-nav-group { display: flex; gap: 6px; }
        .footer-right-submit-group { display: flex; gap: 6px; }

        .authoritative-timer-strip {
            height: 24px;
            background-color: var(--win-bg);
            border-top: 1px solid var(--win-border);
            display: flex;
            align-items: center;
            padding: 0 8px;
            gap: 6px;
            flex-shrink: 0;
        }

        .timer-icon-indicator {
            width: 14px;
            height: 14px;
            display: flex;
            align-items: center;
        }

        .status-left-elapsed-timer {
            font-family: monospace;
            font-size: 11.5px;
            font-weight: bold;
            white-space: nowrap;
        }

        .timeline-track-bar {
            flex: 1;
            height: 8px;
            background-color: var(--win-white);
            border: 1px solid var(--win-border);
            position: relative;
        }

        .timeline-fill-node {
            height: 100%;
            background-color: #444444;
            width: 0%;
        }

        .status-right-remaining-timer {
            font-family: monospace;
            font-size: 11.5px;
            font-weight: bold;
            white-space: nowrap;
            margin-left: 2px;
        }

        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: rgba(0,0,0,0.3);
            z-index: 3000;
            justify-content: center;
            align-items: center;
        }

        .modal-window { background-color: var(--win-bg); width: 380px; border: 1px solid var(--win-dark-border); }
        .modal-header { padding: 4px 6px; background-color: var(--win-panel); border-bottom: 1px solid var(--win-border); font-weight: bold; }
        .modal-body { padding: 10px; background-color: var(--win-white); }
        .summary-matrix-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; margin-bottom: 10px; }
        .summary-matrix-card { border: 1px solid var(--win-border); padding: 4px; text-align: center; background-color: var(--win-bg); }
        .summary-card-val { font-size: 13px; font-weight: bold; }

        .navigator-grid-container {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 4px;
            margin-top: 6px;
            border: 1px solid var(--win-border);
            padding: 4px;
            background-color: var(--win-bg);
        }

        .nav-grid-node {
            height: 20px;
            border: 1px solid var(--win-border);
            background-color: var(--win-white);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-weight: bold;
            font-size: 10px;
        }

        .nav-node-not_visited { background-color: var(--win-white); color: #777777; }
        .nav-node-answered { background-color: #c8e6c9; color: #256029; }
        .nav-node-review { background-color: #fff9c4; color: #b78103; }
        .nav-grid-node.active-node { border: 2px solid #202020; }

        .modal-footer { padding: 4px 6px; background-color: var(--win-bg); border-top: 1px solid var(--win-border); display: flex; justify-content: flex-end; gap: 4px; }
        .toast-sync-notifier { position: fixed; top: 26px; right: 10px; background-color: #202020; color: #ffffff; padding: 2px 6px; font-size: 9.5px; display: none; z-index: 2500; }
        .state-container { display: none; }
    </style>
</head>
<body>

    <div class="toast-sync-notifier" id="toast-sync-status">Saving answers...</div>

    <div class="app-window-titlebar">
        <div class="titlebar-left">SW Sample exam - CSWA</div>
    </div>

    <main class="main-session-workspace">

        <div id="session-error-state" class="state-container" style="padding:20px; display:none;">
            <div>Connection lost.</div>
            <button class="btn-sandbox-nav" style="margin-top:8px;" onclick="initializeExamSessionSandbox();">Retry</button>
        </div>

        <section class="question-sandbox-pane">
            <h1 class="lbl-question-num" id="node-display-num">Question -</h1>
            <span class="lbl-question-points" id="node-display-points">- Points</span>

            <div class="inner-white-instruction-container">
                <div class="instruction-header-row">
                    <span id="node-display-header-code">Q003: Part</span>
                    <span class="btn-help-icon">?</span>
                </div>
                <div id="node-dependency-container" style="display: none;">
                    Depends on Q<span id="node-dependency-index">-</span>.
                </div>
                <div class="question-text-description" id="node-question-text">---</div>
                <div class="attachment-download-zone" id="node-attachments-wrapper"></div>
            </div>
        </section>

        <section class="graphics-display-pane">
            
            <div class="graphics-toolbar">
                <button class="btn-toolbar-tool" title="Zoom Out" onclick="executeManualZoomAction(-0.15)"><svg viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14zM7 9h5v1H7V9z"/></svg></button>
                <button class="btn-toolbar-tool" title="Fit Layout Zoom Reset" onclick="resetActiveCanvasTransformations()"><svg viewBox="0 0 24 24"><path d="M4 6H2v14c0 1.1.9 2 2 2h14v-2H4V6zm16-4H8c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm0 14H8V4h12v12z"/></svg></button>
                <button class="btn-toolbar-tool" title="Zoom In" onclick="executeManualZoomAction(0.15)"><svg viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14zM12 10h-2v2H9v-2H7V9h2V7h1v2h2v1z"/></svg></button>
            </div>

            <div class="gallery-main-viewport" id="viewport-canvas-canvas">
                <img id="gallery-main-img" src="" alt="Question Image">
                
                <div class="thumbnail-strip-absolute-wrapper">
                    <div style="display: flex; gap: 5px;" id="gallery-thumbnail-strip"></div>
                </div>
            </div>

            <div class="response-entry-channel-box" id="node-response-renderer-target"></div>

            <footer class="sandbox-footer-control-bar">
                <div class="footer-left-nav-group">
                    <button class="btn-sandbox-nav" id="btn-action-prev" onclick="navigateQuestionSequence(-1)">Previous Question</button>
                    <button class="btn-sandbox-nav" id="btn-action-reset" onclick="resetActiveQuestionResponseChannel()">Reset Question</button>
                </div>
                
                <button class="btn-sandbox-nav" id="btn-action-summary" onclick="triggerGlobalReviewModalSummary()">Show Summary</button>

                <div class="footer-right-submit-group">
                    <button class="btn-sandbox-nav" id="btn-action-next" onclick="navigateQuestionSequence(1)">Next Question</button>
                </div>
            </footer>

            <div class="authoritative-timer-strip">
                <div class="timer-icon-indicator">
                    <svg viewBox="0 0 24 24" style="width:100%; height:100%; fill:#000000;"><path d="M11.99 2C6.47 2 2 6.48 2 12s4.47 10 9.99 10C17.52 22 22 17.52 22 12S17.52 2 11.99 2zM12 20c-4.42 0-8-3.58-8-8s3.58-8 8-8 8 3.58 8 8-3.58 8-8 8zm.5-13H11v6l5.25 3.15.75-1.23-4.5-2.67z"/></svg>
                </div>
                <div class="status-left-elapsed-timer" id="monitor-elapsed-timer-node">-:--</div>
                <div class="timeline-track-bar">
                    <div class="timeline-fill-node" id="monitor-timeline-fill"></div>
                </div>
                <div class="status-right-remaining-timer" id="monitor-remaining-timer-node">-:--</div>
            </div>

        </section>

    </main>

    <div class="modal-overlay" id="exam-summary-modal" role="dialog" aria-modal="true">
        <div class="modal-window">
            <div class="modal-header">Summary Screen</div>
            <div class="modal-body">
                <div class="summary-matrix-row">
                    <div class="summary-matrix-card"><div class="summary-card-val" id="md-stat-answered">0</div><div style="font-size:10px; color:#555555;">Answered</div></div>
                    <div class="summary-matrix-card" style="display:none;"><div class="summary-card-val" id="md-stat-review">0</div><div style="font-size:10px; color:#555555;">Review</div></div>
                    <div class="summary-matrix-card"><div class="summary-card-val" id="md-stat-unanswered">0</div><div style="font-size:10px; color:#555555;">Unanswered</div></div>
                </div>
                <div class="navigator-grid-container" id="navigator-grid-target"></div>
            </div>
            <div class="modal-footer">
                <button class="btn-sandbox-nav" onclick="closeSummaryModalLayer()">Return to Exam</button>
                <button class="btn-sandbox-nav" style="background-color:var(--win-panel); font-weight:bold; border-color:var(--win-dark-border);" onclick="executeFinalPlatformSubmissionPipeline()">End Test & Submit</button>
            </div>
        </div>
    </div>

    <script>
        const AppRoutes = { resultTarget: "result.html" };

        let elapsedCounterSeconds = 21; 
        let totalLimitDurationSeconds = 5400; 
        let currentActiveIndex = 2; 
        
        let questionSchemaDataset = [];
        let candidateResponseCache = {}; 

        let zoomScaleFactor = 1.0;
        let isPanDraggingActive = false;
        let startPanX = 0, startPanY = 0;
        let currentTranslateX = 0, currentTranslateY = 0;

        const SessionAPIPipeline = {
            fetchActiveExamSession: function() {
                return new Promise((resolve) => {
                    setTimeout(() => {
                        resolve([
                            {
                                "id": "q-001",
                                "type": "mcq",
                                "points": 5,
                                "code_header": "Q001: Mechanical Drawing",
                                "text": "To create drawing view 'B' it is necessary to sketch a spline (as shown) on drawing view 'A' and insert which SOLIDWORKS view type?",
                                "images": ["Screenshot (897).jpg"],
                                "options": ["Crop", "Section", "Projected", "Isometric"]
                            },
                            {
                                "id": "q-002",
                                "type": "mcq",
                                "points": 5,
                                "code_header": "Q002: Detailing Viewports",
                                "text": "To create drawing view 'B' it is necessary to sketch a spline (as shown) on drawing view 'A' and insert which SOLIDWORKS view type?",
                                "images": ["Screenshot (898).jpg"],
                                "options": ["Broken-out Section", "Detail", "Aligned Section", "Section"]
                            },
                            {
                                "id": "q-003",
                                "type": "download_mcq",
                                "points": 15,
                                "code_header": "Q003: Part (Tool Block) - Step 1",
                                "text": "Build this part in SOLIDWORKS.\n\nUnit system: MMGS (millimeter, gram, second)\nDecimal places: 2\nPart origin: Arbitrary\nAll holes through all unless shown otherwise.\nMaterial: AISI 1020 Steel\nDensity = 0.0079 g/mm^3\n\nA = 81.00\nB = 57.00\nC = 43.00\n\nWhat is the overall mass of the part (grams)?\n\nHint: If you don't find an option within 1% of your answer please re-check your solid model.\n\nREMINDER: Save your part in a different file after each question in case it must be reviewed.",
                                "attachments": [{"name": "ToolBlock_Base_Files.zip", "url": "#"}, {"name": "Part1.SLDPRT", "url": "#"}],
                                "images": ["Screenshot (899).jpg", "Screenshot (900).jpg"],
                                "options": ["557.64", "118.93", "939.54", "1028.33"]
                            }
                        ]);
                    }, 10);
                });
            }
        };

        async function initializeExamSessionSandbox() {
            try {
                const schemaRecords = await SessionAPIPipeline.fetchActiveExamSession();
                questionSchemaDataset = schemaRecords;

                questionSchemaDataset.forEach(q => {
                    candidateResponseCache[q.id] = "";
                });

                startPersistentCountdownTimer();
                setupFunctionalZoomAndPanInteractions(); 
                renderQuestionActiveViewportIndex();
            } catch (err) {
                document.getElementById('session-error-state').style.display = 'flex';
            }
        }

        function renderQuestionActiveViewportIndex() {
            const activeNode = questionSchemaDataset[currentActiveIndex];
            if (!activeNode) return;

            document.getElementById('node-display-num').innerText = `Question ${currentActiveIndex + 1} of 8`;
            document.getElementById('node-display-points').innerText = `For ${activeNode.points} points:`;
            document.getElementById('node-display-header-code').innerText = activeNode.code_header;
            document.getElementById('node-question-text').innerText = activeNode.text;

            const dependencyBanner = document.getElementById('node-dependency-container');
            dependencyBanner.style.display = activeNode.depends_on ? 'block' : 'none';
            if (activeNode.depends_on) {
                document.getElementById('node-dependency-index').innerText = activeNode.depends_on_index;
            }

            const attachZone = document.getElementById('node-attachments-wrapper');
            attachZone.innerHTML = '';
            if (activeNode.attachments && activeNode.attachments.length > 0) {
                attachZone.innerHTML = `
                    <div class="attachment-headline">Attachment to this question</div>
                    <div class="attachment-divider"></div>
                `;
                activeNode.attachments.forEach(file => {
                    const btn = document.createElement('a');
                    btn.className = 'btn-download-asset';
                    btn.href = file.url;
                    btn.innerText = file.name;
                    attachZone.appendChild(btn);
                });
                attachZone.style.display = 'flex';
            } else { attachZone.style.display = 'none'; }

            buildGalleryComponentSystem(activeNode.images);
            buildInputResponseRendererChannel(activeNode);
            resetActiveCanvasTransformations();

            document.getElementById('btn-action-prev').disabled = currentActiveIndex === 0;
            document.getElementById('btn-action-next').innerText = currentActiveIndex === questionSchemaDataset.length - 1 ? "Summary Screen" : "Next Question";
        }

        function buildGalleryComponentSystem(imagesArray) {
            const strip = document.getElementById('gallery-thumbnail-strip');
            const mainImg = document.getElementById('gallery-main-img');
            strip.innerHTML = '';

            if (!imagesArray || imagesArray.length === 0) { mainImg.src = ''; return; }
            mainImg.src = imagesArray[0];

            imagesArray.forEach((img, idx) => {
                const thumb = document.createElement('div');
                thumb.className = `gallery-thumbnail-node ${idx === 0 ? 'active' : ''}`;
                thumb.innerHTML = `<img src="${img}" alt="Thumb">`;
                thumb.onclick = () => {
                    document.querySelectorAll('.gallery-thumbnail-node').forEach(t => t.classList.remove('active'));
                    thumb.classList.add('active');
                    mainImg.src = img;
                    resetActiveCanvasTransformations();
                };
                strip.appendChild(thumb);
            });
        }

        function buildInputResponseRendererChannel(node) {
            const targetBox = document.getElementById('node-response-renderer-target');
            targetBox.innerHTML = '';
            const activeValue = candidateResponseCache[node.id];

            if (node.type === 'mcq' || node.type === 'download_mcq') {
                const grid = document.createElement('div');
                grid.className = 'input-quadrant-grid';
                
                node.options.forEach(opt => {
                    const label = document.createElement('label');
                    label.className = 'option-quadrant-wrapper';
                    const checkedState = activeValue === opt ? 'checked' : '';
                    label.innerHTML = `
                        <input type="radio" name="quad-grp" value="${opt}" ${checkedState} onchange="processResponseCaptureState('${node.id}', this.value)"> 
                        <span class="option-quadrant-text">${opt}</span>
                    `;
                    grid.appendChild(label);
                });
                targetBox.appendChild(grid);
            }
        }

        function processResponseCaptureState(nodeId, captureValue) {
            candidateResponseCache[nodeId] = captureValue;
        }

        function setupFunctionalZoomAndPanInteractions() {
            const viewport = document.getElementById('viewport-canvas-canvas');

            viewport.addEventListener('wheel', (e) => {
                e.preventDefault();
                const scaleDeltaFactor = e.deltaY < 0 ? 0.08 : -0.08;
                executeManualZoomAction(scaleDeltaFactor);
            }, { passive: false });

            viewport.addEventListener('mousedown', (e) => {
                if (e.button !== 0) return;
                isPanDraggingActive = true;
                startPanX = e.clientX - currentTranslateX;
                startPanY = e.clientY - currentTranslateY;
            });

            window.addEventListener('mousemove', (e) => {
                if (!isPanDraggingActive) return;
                currentTranslateX = e.clientX - startPanX;
                currentTranslateY = e.clientY - startPanY;
                synchronizeCanvasTransformations();
            });

            window.addEventListener('mouseup', () => { isPanDraggingActive = false; });
        }

        function executeManualZoomAction(scaleValueDelta) {
            zoomScaleFactor = Math.max(0.5, Math.min(zoomScaleFactor + scaleValueDelta, 4.0));
            synchronizeCanvasTransformations();
        }

        function synchronizeCanvasTransformations() {
            const targetImg = document.getElementById('gallery-main-img');
            targetImg.style.transform = `translate(${currentTranslateX}px, ${currentTranslateY}px) scale(${zoomScaleFactor})`;
        }

        function resetActiveCanvasTransformations() {
            zoomScaleFactor = 1.0;
            currentTranslateX = 0;
            currentTranslateY = 0;
            synchronizeCanvasTransformations();
        }

        function navigateQuestionSequence(directionOffset) {
            const targetIndex = currentActiveIndex + directionOffset;
            if (directionOffset === 1 && currentActiveIndex === questionSchemaDataset.length - 1) {
                triggerGlobalReviewModalSummary();
                return;
            }
            if (targetIndex >= 0 && targetIndex < questionSchemaDataset.length) {
                currentActiveIndex = targetIndex;
                renderQuestionActiveViewportIndex();
            }
        }

        function resetActiveQuestionResponseChannel() {
            const activeNode = questionSchemaDataset[currentActiveIndex];
            candidateResponseCache[activeNode.id] = "";
            renderQuestionActiveViewportIndex();
        }

        function buildNavigatorModalGridComponent() {
            const container = document.getElementById('navigator-grid-target');
            container.innerHTML = '';

            questionSchemaDataset.forEach((q, idx) => {
                const btn = document.createElement('div');
                btn.className = 'nav-grid-node';
                
                let stateClass = "nav-node-not_visited";
                if (candidateResponseCache[q.id] !== "") stateClass = "nav-node-answered";
                if (idx === currentActiveIndex) btn.classList.add('active-node');

                btn.classList.add(stateClass);
                btn.innerText = idx + 1;
                btn.onclick = () => {
                    currentActiveIndex = idx;
                    closeSummaryModalLayer();
                    renderQuestionActiveViewportIndex();
                };
                container.appendChild(btn);
            });
        }

        function startPersistentCountdownTimer() {
            const elapsedLabel = document.getElementById('monitor-elapsed-timer-node');
            const remainingLabel = document.getElementById('monitor-remaining-timer-node');
            const fill = document.getElementById('monitor-timeline-fill');
            
            setInterval(() => {
                elapsedCounterSeconds++;
                
                const elapsedMins = Math.floor(elapsedCounterSeconds / 60);
                const elapsedSecs = elapsedCounterSeconds % 60;
                elapsedLabel.innerText = `${elapsedMins}:${String(elapsedSecs).padStart(2, '0')}`;

                const totalRemainingSeconds = Math.max(0, totalLimitDurationSeconds - elapsedCounterSeconds);
                const remainingMins = Math.floor(totalRemainingSeconds / 60);
                const remainingSecs = totalRemainingSeconds % 60;
                remainingLabel.innerText = `${remainingMins}:${String(remainingSecs).padStart(2, '0')}`;

                const progressTrackPercent = (elapsedCounterSeconds / totalLimitDurationSeconds) * 100;
                fill.style.width = `${progressTrackPercent}%`;
            }, 1000);
        }

        function triggerGlobalReviewModalSummary() {
            let answered = 0, unanswered = 0;
            questionSchemaDataset.forEach(q => {
                if (candidateResponseCache[q.id] !== "") answered++;
                else unanswered++;
            });

            document.getElementById('md-stat-answered').innerText = answered;
            document.getElementById('md-stat-unanswered').innerText = unanswered;
            buildNavigatorModalGridComponent();
            document.getElementById('exam-summary-modal').style.display = 'flex';
        }

        function closeSummaryModalLayer() { document.getElementById('exam-summary-modal').style.display = 'none'; }
        function executeFinalPlatformSubmissionPipeline() { closeSummaryModalLayer(); window.location.href = AppRoutes.resultTarget; }
    </script>
</body>
</html>
